services:
  intellistar:
    build: .
    container_name: intellistar
    env_file:
      - .env # PORT, NWS_USER_AGENT — copy .env.example to .env and fill in real values
    ports:
      - "${PORT:-3000}:${PORT:-3000}"
      - "9229:9229" # Node inspector — used by the "Attach to Docker" VS Code debug config
    environment:
      - PORT=${PORT:-3000}
    command: ["node", "--inspect=0.0.0.0:9229", "server.js"]
    restart: unless-stopped
    depends_on:
      piper:
        condition: service_healthy # wait for piper's Flask app to actually respond, not just the container to start
    volumes:
      - .:/app # live-edit: changes to .js/.css/.html take effect on page reload, no rebuild needed
      # Keep the container's own node_modules, don't let the bind mount hide it (the
      # host repo has no node_modules/ of its own, so without this the bind mount above
      # would leave /app/node_modules simply missing inside the container).
      #
      # Trade-off: Compose preserves this anonymous volume's contents across `up` runs
      # by default, even after `up --build`, so if package.json ever gains a new
      # dependency, a plain rebuild alone will NOT pick it up -- the old volume just
      # gets remounted over the freshly-installed node_modules from the new image,
      # and the app fails with ERR_MODULE_NOT_FOUND for the new package. Whenever
      # package.json/package-lock.json change, rebuild with:
      #   docker compose up --build -V
      # (-V / --renew-anon-volumes forces a fresh node_modules volume from the new
      # image instead of reusing the stale one.)
      - /app/node_modules
    extra_hosts:
      - "host.docker.internal:host-gateway" # lets the container reach services on your host machine
    # NOTE: if common_configuration.js points a Rainbow.AI endpoint at "localhost",
    # that means "inside this container" once running via Docker. Change it to
    # "host.docker.internal" to reach a server running on the host instead. PiperTTS
    # is self-hosted below as the "piper" sidecar, reachable at http://piper:5000.

  piper:
    build: ./piper
    container_name: intellistar-piper
    restart: unless-stopped
    environment:
      # Fixed onnxruntime thread count -- see the comment in piper/app.py. Needed
      # (not just tunable) on setups like Docker-inside-LXC where onnxruntime's
      # default auto-detected thread pool fails to set CPU affinity. Raise this on
      # dedicated/beefier hardware if you want more synthesis throughput.
      - PIPER_NUM_THREADS=${PIPER_NUM_THREADS:-2}
    # No published host port needed -- only intellistar's server.js talks to this,
    # over the internal compose network at http://piper:5000.

  # Optional: renders the app in a headless Chromium and re-encodes it as an HLS
  # stream for a Roku (see roku-stream/ and roku-channel/). Off by default -- this
  # runs a full browser + video encoder, much heavier than the rest of this stack.
  # Enable it either per-run with `docker compose --profile stream up -d`, or always
  # via `.env` by setting COMPOSE_PROFILES=stream (docker compose reads that variable
  # from .env automatically, no flag needed). See .env.example for STREAM_* options.
  intellistar-stream:
    build: ./roku-stream
    container_name: intellistar-stream
    profiles: ["stream"]
    restart: unless-stopped
    environment:
      - STREAM_URL_BASE=http://intellistar:${PORT:-3000}
      - STREAM_LOCATION=${STREAM_LOCATION:-AUTOMATIC}
      - STREAM_UNITS=${STREAM_UNITS:-e}
      - STREAM_WIDTH=${STREAM_WIDTH:-1280}
      - STREAM_HEIGHT=${STREAM_HEIGHT:-720}
      - STREAM_FRAMERATE=${STREAM_FRAMERATE:-30}
      - STREAM_BITRATE=${STREAM_BITRATE:-3000k}
      # The clock/dates shown on-screen are computed client-side (see MainScript.js) --
      # for a real visitor that's their own device's timezone, but this container's
      # headless Chromium IS the "client" here, and Debian defaults to UTC with no
      # timezone data at all otherwise. Set to your actual local IANA zone (e.g.
      # America/Chicago, America/New_York) -- see .env.example.
      - TZ=${STREAM_TZ:-UTC}
    volumes:
      # Same directory the intellistar container sees at /app/stream_output (via its
      # own .:/app bind mount above) -- server.js serves it back out at /stream/*, no
      # extra plumbing needed between the two containers.
      - ./stream_output:/output
    # Chromium's default /dev/shm (64MB) is too small and it will crash intermittently.
    shm_size: "1gb"
    depends_on:
      intellistar:
        condition: service_started
